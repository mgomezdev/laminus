version: '3.8'

services:
  laminus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laminus
    ports:
      - "5000:5000"
    volumes:
      # Mounted volume for profiles, presets, and configuration
      - ./config:/config
      # Mounted volume for inputs and outputs (models, sliced G-codes)
      - ./data:/data
      # Mount the app code for live reload / dev simplicity
      - ./app:/workspace/app
      # Named volume caches the OrcaSlicer install across restarts.
      # Re-downloaded only when ORCA_VERSION changes.
      - laminus-slicer:/opt/orcaslicer
    environment:
      - TZ=Etc/UTC
      - PYTHONUNBUFFERED=1
      - ORCA_VERSION=${ORCA_VERSION:-2.4.1}
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  laminus-slicer:
