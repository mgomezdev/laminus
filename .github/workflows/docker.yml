name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  check-spec-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        run: pip install -r requirements.txt

      - name: Regenerate openapi.json
        run: python scripts/export_openapi.py

      - name: Fail if spec is stale
        run: git diff --exit-code openapi.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest httpx anyio[asyncio]

      - name: Install mock OrcaSlicer
        run: |
          chmod +x mock/orca_cli.py
          sudo ln -sf "$(pwd)/mock/orca_cli.py" /usr/local/bin/orcaslicer

      - name: Run tests
        env:
          SYSTEM_PROFILES_DIR: ${{ github.workspace }}/tests/fixtures/profiles
          USER_CONFIG_DIR: /tmp/laminus-test-user
          CONFIG_DIR: /tmp/laminus-test-config
          DATA_DIR: /tmp/laminus-test-data
        run: pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: [check-spec-freshness, test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ninjabuffalo/laminus
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (mock)
        id: meta-mock
        uses: docker/metadata-action@v5
        with:
          images: ninjabuffalo/laminus-mock
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push mock image
        uses: docker/build-push-action@v6
        with:
          context: mock
          push: true
          tags: ${{ steps.meta-mock.outputs.tags }}
          labels: ${{ steps.meta-mock.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach spec to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: openapi.json
